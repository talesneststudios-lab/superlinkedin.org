<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QNGS22DM1Z"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-QNGS22DM1Z');
    </script>
    <title>SuperLinkedIn &mdash; Authentication Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0f;
            color: #f0f0f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            text-align: center;
            max-width: 440px;
            padding: 48px;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.35rem;
            color: #f0f0f5;
            text-decoration: none;
            margin-bottom: 48px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #0A66C2, #70B5F9);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.1rem;
            color: #fff;
        }
        .error-circle {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid rgba(239, 68, 68, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 1.8rem;
            color: #ef4444;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 12px;
        }
        p {
            color: #9999aa;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .error-message {
            margin-top: 20px;
            padding: 16px 20px;
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 12px;
            font-size: 0.85rem;
            color: #ef4444;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            margin-top: 32px;
            background: #0A66C2;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(10, 102, 194, 0.3);
        }
        .btn:hover {
            background: #0977d4;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <a href="../index.html" class="logo">
            <div class="logo-icon">SL</div>
            SuperLinkedIn
        </a>
        <div class="error-circle">&#10007;</div>
        <h2>Authentication Failed</h2>
        <p>Something went wrong while connecting your LinkedIn account.</p>
        <div class="error-message" id="errorMessage">An unknown error occurred</div>
        <a href="../login.html" class="btn">Try Again</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const message = params.get('message');
        if (message) {
            document.getElementById('errorMessage').textContent = message;
        }
    </script>
</body>
</html>
