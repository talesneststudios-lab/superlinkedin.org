<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>SuperLinkedIn &mdash; Connected!</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0f;
            color: #f0f0f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            text-align: center;
            max-width: 440px;
            padding: 48px;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.35rem;
            color: #f0f0f5;
            text-decoration: none;
            margin-bottom: 48px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #0A66C2, #70B5F9);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.1rem;
            color: #fff;
        }
        .check-circle {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.1);
            border: 2px solid rgba(34, 197, 94, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 2rem;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 12px;
        }
        p {
            color: #9999aa;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .user-info {
            margin-top: 24px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .user-avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0A66C2, #70B5F9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            font-size: 1.1rem;
            flex-shrink: 0;
            overflow: hidden;
        }
        .user-avatar img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .user-details {
            text-align: left;
        }
        .user-name {
            font-weight: 700;
            font-size: 1rem;
        }
        .user-email {
            font-size: 0.8rem;
            color: #666677;
            margin-top: 2px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            margin-top: 32px;
            background: #0A66C2;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(10, 102, 194, 0.3);
        }
        .btn:hover {
            background: #0977d4;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <a href="../index.html" class="logo">
            <div class="logo-icon">SL</div>
            SuperLinkedIn
        </a>
        <div class="check-circle">&#10003;</div>
        <h2>You're connected!</h2>
        <p>Your LinkedIn account has been successfully linked to SuperLinkedIn.</p>

        <div class="user-info" id="userInfo" style="display: none;">
            <div class="user-avatar" id="userAvatar"></div>
            <div class="user-details">
                <div class="user-name" id="userName"></div>
                <div class="user-email" id="userEmail"></div>
            </div>
        </div>

        <a href="../upgrade.html" class="btn">Continue to SuperLinkedIn</a>
    </div>

    <script>
        fetch('/api/me')
            .then(r => r.json())
            .then(user => {
                if (user.name) {
                    document.getElementById('userInfo').style.display = 'flex';
                    document.getElementById('userName').textContent = user.name;
                    document.getElementById('userEmail').textContent = user.email || '';

                    const avatarEl = document.getElementById('userAvatar');
                    if (user.picture) {
                        avatarEl.innerHTML = `<img src="${user.picture}" alt="${user.name}">`;
                    } else {
                        const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
                        avatarEl.textContent = initials;
                    }
                }
            })
            .catch(() => {});
    </script>
</body>
</html>
