<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SuperLinkedIn — AI Tools (Chrome Web Store mock)</title>
    <style>
        html {
            width: 640px;
            height: 400px;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        body {
            width: 640px;
            height: 400px;
            margin: 0;
            padding: 0;
            overflow: hidden;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        *, *::before, *::after { box-sizing: inherit; }

        .frame {
            width: 640px;
            height: 400px;
            overflow: hidden;
            padding: 10px 14px 8px;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            padding-bottom: 8px;
            margin-bottom: 6px;
            border-bottom: 1px solid #334155;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #0A66C2, #70B5F9);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.65rem;
            color: #fff;
        }
        .brand {
            font-weight: 800;
            font-size: 0.92rem;
            color: #f1f5f9;
        }
        .header-right {
            display: flex;
            gap: 4px;
        }
        .icon-btn {
            background: none;
            border: 1px solid #475569;
            border-radius: 6px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
            font-size: 0.8rem;
            color: #94a3b8;
            transition: all 0.2s;
        }
        .icon-btn:hover {
            border-color: #70B5F9;
            color: #bae6fd;
            background: rgba(112, 181, 249, 0.12);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 2px;
            background: #1e293b;
            border-radius: 8px;
            padding: 3px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .tab {
            flex: 1;
            padding: 6px 4px;
            background: none;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.72rem;
            font-weight: 700;
            color: #94a3b8;
            cursor: default;
            text-align: center;
        }
        .tab.active {
            background: #0f172a;
            color: #70B5F9;
            box-shadow: none;
        }

        /* Main column */
        .panel {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section-title {
            font-size: 0.68rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0 0 5px 0;
            flex-shrink: 0;
        }
        .section-title.quick {
            margin-top: 6px;
            margin-bottom: 5px;
        }

        .ai-editor-wrap {
            position: relative;
            flex-shrink: 0;
        }
        .ai-textarea {
            width: 100%;
            height: 82px;
            min-height: 82px;
            max-height: 82px;
            padding: 8px 10px;
            border: 1px solid #475569;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.78rem;
            resize: none;
            outline: none;
            line-height: 1.35;
            background: #1e293b;
            color: #e2e8f0;
        }
        .ai-textarea:focus {
            border-color: #0A66C2;
        }
        .ai-textarea::placeholder {
            color: #64748b;
        }

        .ai-actions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            align-items: stretch;
            flex-shrink: 0;
        }
        .ai-btn {
            flex: 1;
            padding: 7px 5px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.72rem;
            font-weight: 700;
            cursor: default;
            background: #0A66C2;
            color: #fff;
        }
        .ai-btn.secondary {
            background: #334155;
            color: #e2e8f0;
        }
        .ai-btn.icon-only {
            flex: 0 0 38px;
            padding: 7px;
            border: 1px solid #475569;
            background: #1e293b;
            color: #70B5F9;
        }

        .ai-quick-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            flex: 1;
            min-height: 0;
            align-content: start;
        }
        .ai-quick-btn {
            padding: 5px 3px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            font-family: inherit;
            font-size: 0.65rem;
            font-weight: 600;
            color: #cbd5e1;
            cursor: default;
            text-align: center;
            line-height: 1.25;
        }

        /* Footer */
        .popup-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            margin-top: 6px;
            padding-top: 7px;
            border-top: 1px solid #334155;
        }
        .popup-footer a {
            font-size: 0.74rem;
            color: #70B5F9;
            text-decoration: none;
            font-weight: 600;
        }
        .popup-footer a:hover {
            text-decoration: underline;
        }
        .btn-link {
            background: none;
            border: none;
            font-family: inherit;
            font-size: 0.74rem;
            color: #94a3b8;
            cursor: default;
            padding: 0;
        }
        .btn-link:hover {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="frame">
        <header class="header">
            <div class="header-left">
                <div class="logo" aria-hidden="true">SL</div>
                <span class="brand">SuperLinkedIn</span>
            </div>
            <div class="header-right">
                <button type="button" class="icon-btn" title="Toggle LinkedIn Sidebar" aria-label="Menu">&#9776;</button>
                <button type="button" class="icon-btn" title="Settings" aria-label="Settings">&#9881;</button>
            </div>
        </header>

        <div class="tabs" role="tablist">
            <span class="tab" role="tab">Overview</span>
            <span class="tab" role="tab">Analytics</span>
            <span class="tab active" role="tab" aria-selected="true">AI Tools</span>
        </div>

        <div class="panel">
            <div class="section-title">AI post writer</div>
            <div class="ai-editor-wrap">
                <textarea class="ai-textarea" placeholder="Write or paste your post here... Generated drafts appear here too." readonly aria-readonly="true"></textarea>
            </div>
            <div class="ai-actions">
                <button type="button" class="ai-btn">&#129302; Generate Post</button>
                <button type="button" class="ai-btn secondary">&#10024; Improve</button>
                <button type="button" class="ai-btn icon-only" title="Copy post">&#128203;</button>
            </div>

            <div class="section-title quick">Quick improve</div>
            <div class="ai-quick-grid">
                <button type="button" class="ai-quick-btn">&#9998; Grammar</button>
                <button type="button" class="ai-quick-btn">&#127760; Translate</button>
                <button type="button" class="ai-quick-btn">&#10024; Hook</button>
                <button type="button" class="ai-quick-btn">&#9986; Concise</button>
                <button type="button" class="ai-quick-btn">&#128171; Engaging</button>
                <button type="button" class="ai-quick-btn">&#128514; Humorous</button>
            </div>
        </div>

        <footer class="popup-footer">
            <a href="#">Open Dashboard</a>
            <button type="button" class="btn-link">Disconnect</button>
        </footer>
    </div>
</body>
</html>
