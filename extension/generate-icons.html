<!DOCTYPE html>
<html>
<body>
<p>Right-click each canvas and "Save image as" to the icons folder with the correct filename.</p>
<div>
  <p>icon16.png:</p><canvas id="c16" width="16" height="16"></canvas>
  <p>icon48.png:</p><canvas id="c48" width="48" height="48"></canvas>
  <p>icon128.png:</p><canvas id="c128" width="128" height="128"></canvas>
</div>
<script>
function drawIcon(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, size, size);
  g.addColorStop(0, '#0A66C2');
  g.addColorStop(1, '#70B5F9');
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = g;
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${size * 0.42}px Inter, Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('SL', size / 2, size / 2 + size * 0.02);
}
drawIcon('c16', 16);
drawIcon('c48', 48);
drawIcon('c128', 128);
</script>
</body>
</html>
